spring:
  application:
    name: investlens
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/investlens}
    username: ${DB_USERNAME:investlens}
    password: ${DB_PASSWORD:investlens}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  jmx:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  instrument-logo:
    enabled: ${INSTRUMENT_LOGO_ENABLED:true}
    base-url: ${INSTRUMENT_LOGO_BASE_URL:https://img.logo.dev}
    publishable-key: ${LOGO_DEV_PUBLISHABLE_KEY:}
    size: ${INSTRUMENT_LOGO_SIZE:64}
  market-data:
    enabled: ${MARKET_DATA_ENABLED:true}
    base-url: ${MARKET_DATA_BASE_URL:https://query1.finance.yahoo.com}
    timeout: ${MARKET_DATA_TIMEOUT:10s}
  instrument-catalog:
    enabled: ${INSTRUMENT_CATALOG_ENABLED:true}
    cron: ${INSTRUMENT_CATALOG_CRON:0 0 3 * * *}
    timeout: ${INSTRUMENT_CATALOG_TIMEOUT:20s}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  ai:
    enabled: ${OLLAMA_ENABLED:false}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:gemma3:4b}
    timeout: 60s
  gemini:
    enabled: ${GEMINI_ENABLED:false}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.5-flash}
    timeout: ${GEMINI_TIMEOUT:60s}
  news-ingestion:
    enabled: ${NEWS_INGESTION_ENABLED:false}
    cron: ${NEWS_INGESTION_CRON:0 0/30 * * * *}
    timeout: 10s
    feeds: []
  news-search:
    enabled: ${NEWS_SEARCH_ENABLED:true}
    base-url: ${NEWS_SEARCH_BASE_URL:https://news.google.com/rss/search}
    timeout: ${NEWS_SEARCH_TIMEOUT:10s}
    refresh-interval: ${NEWS_SEARCH_REFRESH_INTERVAL:30m}
    lookback-days: ${NEWS_SEARCH_LOOKBACK_DAYS:90}
    max-results: ${NEWS_SEARCH_MAX_RESULTS:20}
