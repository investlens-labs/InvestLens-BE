spring:
  application:
    name: investlens
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/investlens}
    username: ${DB_USERNAME:investlens}
    password: ${DB_PASSWORD:investlens}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  instrument-catalog:
    enabled: ${INSTRUMENT_CATALOG_ENABLED:true}
    cron: ${INSTRUMENT_CATALOG_CRON:0 0 3 * * *}
    timeout: ${INSTRUMENT_CATALOG_TIMEOUT:20s}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  ai:
    enabled: ${OLLAMA_ENABLED:false}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:gemma3:4b}
    timeout: 60s
  news-ingestion:
    enabled: ${NEWS_INGESTION_ENABLED:false}
    cron: ${NEWS_INGESTION_CRON:0 0/30 * * * *}
    timeout: 10s
    feeds: []
