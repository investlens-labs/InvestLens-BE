# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    name: investlens-be
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investlens-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: investlens-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: investlens-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173
      - key: OLLAMA_ENABLED
        value: false
      - key: NEWS_INGESTION_ENABLED
        value: false
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=75 -XX:+UseSerialGC

databases:
  - name: investlens-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: investlens
    user: investlens
    ipAllowList: []
