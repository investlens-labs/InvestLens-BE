# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    name: investlens-be
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investlens-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: investlens-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: investlens-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://investlens.mandoo4137-a53.workers.dev
      - key: OLLAMA_ENABLED
        value: false
      - key: GEMINI_ENABLED
        value: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: NEWS_INGESTION_ENABLED
        value: false
      - key: NEWS_SEARCH_ENABLED
        value: true
      - key: NEWS_SEARCH_LOOKBACK_DAYS
        value: 90
      - key: NEWS_SEARCH_MAX_RESULTS
        value: 20
      - key: INSTRUMENT_LOGO_ENABLED
        value: true
      - key: LOGO_DEV_PUBLISHABLE_KEY
        sync: false
      - key: JAVA_OPTS
        value: -Xms64m -Xmx256m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError
      - key: SPRING_MAIN_LAZY_INITIALIZATION
        value: true
      - key: SPRING_DATA_JPA_REPOSITORIES_BOOTSTRAP_MODE
        value: lazy

databases:
  - name: investlens-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: investlens
    user: investlens
    ipAllowList: []
