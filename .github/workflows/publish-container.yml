name: Publish container image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run full verification
        run: ./scripts/verify.sh

  postgres-migration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: investlens_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d investlens_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/investlens_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-only-jwt-secret-at-least-thirty-two-characters
      NEWS_SEARCH_ENABLED: "false"
      INSTRUMENT_CATALOG_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Flyway and API against PostgreSQL 16
        run: ./gradlew test --tests com.investlens.ApiSmokeIntegrationTest --no-daemon

  publish:
    if: github.event_name != 'pull_request'
    needs:
      - verify
      - postgres-migration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/investlens-labs/investlens-be:latest
            ghcr.io/investlens-labs/investlens-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name != 'pull_request'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
      IMAGE_URL: ghcr.io/investlens-labs/investlens-be:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger immutable image deployment
        id: render
        shell: bash
        run: |
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          response="$(curl --fail --silent --show-error \
            --request POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header 'Content-Type: application/json' \
            --data "$(jq -nc --arg image "$IMAGE_URL" '{imageUrl: $image}')")"
          deploy_id="$(jq -er '.id' <<<"$response")"
          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Wait for the exact deployment
        shell: bash
        run: |
          deploy_id="${{ steps.render.outputs.deploy_id }}"
          for attempt in $(seq 1 40); do
            status="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" \
              | jq -r '.status')"
            echo "Render deploy $deploy_id: $status ($attempt/40)"
            case "$status" in
              live)
                echo "Render reports live; allowing routing to stabilize"
                sleep 30
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated) exit 1 ;;
            esac
            sleep 20
          done
          echo "Render deployment timed out" >&2
          exit 1

      - name: Verify production API
        env:
          FRONTEND_ORIGIN: https://investlens.mandoo4137-a53.workers.dev
        run: ./scripts/smoke-production.sh https://investlens-be.onrender.com
